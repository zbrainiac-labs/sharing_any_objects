name: Update Local Repository and Run Sonar Scanner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline:
    uses: zbrainiac-labs/DataOpsBackbone/.github/workflows/dataops-pipeline.yml@main
    with:
      SOURCE_DATABASE: ECO_DEV
      SOURCE_SCHEMA: ECO_DCM
      DCM_PROJECT_IDENTIFIER: ECO_DEV.ECO_DCM.SHARING_OBJECTS
      DCM_TARGET: DEV
      CLONE_PER_BUILD: true
    secrets: inherit
